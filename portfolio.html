<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;color:#1e293b;line-height:1.6}
.accent{color:#2563eb}

/* Hero */
.hero{background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 50%,#bfdbfe 100%);padding:4rem 1.5rem 3rem;text-align:center}
.hero-avatar{width:120px;height:120px;border-radius:50%;margin:0 auto 1.25rem;background:#fff;border:4px solid #fff;box-shadow:0 4px 24px rgba(37,99,235,.15);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:#2563eb;overflow:hidden}
.hero-avatar img{width:100%;height:100%;object-fit:cover}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:.25rem}
.hero .role{font-size:1.05rem;color:#2563eb;font-weight:500;margin-bottom:.5rem}
.hero .meta{font-size:.85rem;color:#64748b;margin-bottom:1rem}
.hero .bio{max-width:600px;margin:0 auto;font-size:.95rem;color:#475569}

/* Stats */
.stats{display:flex;justify-content:center;gap:2rem;padding:1.5rem;flex-wrap:wrap;border-bottom:1px solid #e2e8f0}
.stat{text-align:center}
.stat .num{font-size:1.75rem;font-weight:700;color:#2563eb}
.stat .label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-weight:500}

/* Content */
.content{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* Summary Cards */
.summary-section{margin-bottom:2.5rem}
.summary-section h2{font-size:1.2rem;font-weight:700;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #2563eb;display:inline-block}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;margin-top:.75rem}
.summary-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:.75rem;padding:1rem;transition:transform .2s,box-shadow .2s}
.summary-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.summary-card .card-cat{font-size:.65rem;font-weight:600;text-transform:uppercase;padding:.15rem .5rem;border-radius:1rem;display:inline-block;margin-bottom:.4rem}
.cat-project{background:#dbeafe;color:#1d4ed8}
.cat-skill{background:#dcfce7;color:#16a34a}
.cat-achievement{background:#fef9c3;color:#a16207}
.cat-certificate{background:#f3e8ff;color:#7c3aed}
.summary-card h3{font-size:.9rem;font-weight:600;margin-bottom:.15rem}
.summary-card .card-date{font-size:.75rem;color:#94a3b8}
.stars{display:inline-flex;gap:1px;color:#f59e0b;font-size:.8rem}
.stars .empty{color:#e2e8f0}

/* Timeline */
.timeline-section h2{font-size:1.2rem;font-weight:700;margin-bottom:1.5rem;padding-bottom:.5rem;border-bottom:2px solid #2563eb;display:inline-block}
.timeline{position:relative;padding-left:2rem}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:#e2e8f0}
.timeline-group{margin-bottom:2rem}
.timeline-group h3{font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#2563eb;margin-bottom:1rem;padding-left:.25rem}
.timeline-item{position:relative;margin-bottom:1.25rem;opacity:0;transform:translateY(20px);transition:all .5s ease}
.timeline-item.visible{opacity:1;transform:translateY(0)}
.timeline-item::before{content:'';position:absolute;left:-1.65rem;top:.5rem;width:12px;height:12px;border-radius:50%;background:#2563eb;border:2px solid #fff;box-shadow:0 0 0 2px #2563eb}
.timeline-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:.75rem;padding:1rem 1.25rem;transition:box-shadow .2s}
.timeline-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.timeline-card .tc-header{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap;margin-bottom:.35rem}
.timeline-card h4{font-size:.95rem;font-weight:600}
.timeline-card .tc-date{font-size:.75rem;color:#94a3b8}
.timeline-card .tc-cat{font-size:.6rem;font-weight:600;text-transform:uppercase;padding:.12rem .45rem;border-radius:1rem}
.timeline-card p{font-size:.85rem;color:#475569;margin-top:.25rem}
.timeline-card .tc-image{margin-top:.5rem;border-radius:.5rem;max-width:100%;max-height:300px;object-fit:cover}
.timeline-card .tc-link{display:inline-flex;align-items:center;gap:.25rem;margin-top:.5rem;font-size:.8rem;color:#2563eb;text-decoration:none}
.timeline-card .tc-link:hover{text-decoration:underline}

/* Print */
.print-bar{position:fixed;bottom:1.5rem;right:1.5rem;z-index:50}
.print-btn{display:flex;align-items:center;gap:.4rem;padding:.65rem 1.25rem;background:#2563eb;color:#fff;border:none;border-radius:2rem;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.3);transition:all .15s}
.print-btn:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35)}

/* Not Found */
.not-found{text-align:center;padding:6rem 1.5rem;color:#94a3b8}
.not-found h1{font-size:1.5rem;color:#1e293b;margin-bottom:.5rem}

@media print{
  .print-bar{display:none}
  .hero{padding:2rem 1rem;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .timeline-item{opacity:1!important;transform:none!important}
}
@media(max-width:600px){
  .hero h1{font-size:1.5rem}
  .hero-avatar{width:90px;height:90px;font-size:2rem}
  .stats{gap:1.25rem}
  .stat .num{font-size:1.35rem}
  .summary-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="app"></div>
<div class="print-bar" id="printBar" style="display:none">
  <button class="print-btn" onclick="window.print()">🖨️ Print / PDF</button>
</div>

<script>
const STORAGE_KEY = 'tabashir_portfolios';

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function renderStars(n) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += `<span class="${i > n ? 'empty' : ''}">★</span>`;
  return `<span class="stars">${s}</span>`;
}

function daysBetween(d1, d2) {
  return Math.floor((d2 - d1) / 86400000);
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function renderList(data) {
  const trainees = Object.entries(data);
  if (!trainees.length) {
    document.getElementById('app').innerHTML = `
      <div class="not-found">
        <h1>No Trainees Yet</h1>
        <p>Open the <a href="admin.html" style="color:#2563eb">Admin Panel</a> to add trainees.</p>
      </div>`;
    return;
  }
  document.title = 'Tabashir — Trainee Portfolios';

  const TRACKS = [
    { key:'appdev',   label:'Applications Development', color:'#1d4ed8', bg:'#dbeafe', border:'#bfdbfe' },
    { key:'security', label:'Security & Forensics',     color:'#b91c1c', bg:'#fee2e2', border:'#fecaca' },
    { key:'',         label:'Unassigned',               color:'#475569', bg:'#f1f5f9', border:'#e2e8f0' },
  ];

  function traineeCard(id, t) {
    const avatar = t.photo
      ? `<img src="${escapeHtml(t.photo)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : `<span style="font-size:1.2rem;font-weight:700;color:#2563eb">${initials(t.name)}</span>`;
    const count     = (t.progress || []).length;
    const tasksDone = (t.tasks || []).filter(tk => tk.status === 'done').length;
    const tasksTotal= (t.tasks || []).length;
    const att       = (t.attendance || []);
    const present   = att.filter(a => a.status === 'present' || a.status === 'late').length;
    const attPct    = att.length ? Math.round(present / att.length * 100) + '%' : '—';
    return `
      <a href="portfolio.html?id=${encodeURIComponent(id)}" style="text-decoration:none;display:block;margin-bottom:.5rem">
        <div style="display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;background:#fff;border:1px solid #e2e8f0;border-radius:.7rem;transition:all .15s"
             onmouseover="this.style.borderColor='#2563eb';this.style.boxShadow='0 0 0 3px rgba(37,99,235,.07)'"
             onmouseout="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'">
          <div style="width:42px;height:42px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden">${avatar}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:.9rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(t.name)}</div>
            <div style="font-size:.73rem;color:#64748b;margin-top:.15rem;display:flex;gap:.6rem;flex-wrap:wrap">
              <span>${count} entries</span>
              ${tasksTotal ? `<span>Tasks: ${tasksDone}/${tasksTotal}</span>` : ''}
              <span>Attendance: ${attPct}</span>
            </div>
          </div>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>`;
  }

  let sectionsHtml = '';
  TRACKS.forEach(track => {
    const group = trainees.filter(([,t]) =>
      track.key === '' ? !t.track || !['appdev','security'].includes(t.track) : t.track === track.key
    );
    if (!group.length) return;
    sectionsHtml += `
      <div style="margin-bottom:1.75rem">
        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem">
          <div style="width:4px;height:20px;background:${track.color};border-radius:2px"></div>
          <h2 style="font-size:1rem;font-weight:700;color:#1e293b">${track.label}</h2>
          <span style="background:${track.bg};color:${track.color};border:1px solid ${track.border};padding:.15rem .65rem;border-radius:1rem;font-size:.72rem;font-weight:600">${group.length}</span>
        </div>
        ${group.map(([id, t]) => traineeCard(id, t)).join('')}
      </div>`;
  });

  document.getElementById('app').innerHTML = `
    <div style="max-width:680px;margin:0 auto;padding:2rem 1.1rem">
      <div style="text-align:center;margin-bottom:2rem">
        <div style="width:46px;height:46px;border-radius:11px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;margin:0 auto .7rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <h1 style="font-size:1.4rem;font-weight:700;color:#1e293b">Trainee Portfolios</h1>
        <p style="font-size:.82rem;color:#64748b;margin-top:.25rem">${trainees.length} trainee${trainees.length !== 1 ? 's' : ''}</p>
      </div>
      ${sectionsHtml}
    </div>`;
}

function render() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  if (!id) { renderList(data); return; }

  const trainee = data[id];

  if (!trainee) {
    document.getElementById('app').innerHTML = `
      <div class="not-found">
        <h1>Portfolio Not Found</h1>
        <p>The requested trainee portfolio could not be loaded.<br>
        <a href="portfolio.html" style="color:#2563eb">← Back to list</a></p>
      </div>`;
    return;
  }

  document.title = `${trainee.name} — Portfolio`;
  document.getElementById('printBar').style.display = '';

  const progress = (trainee.progress || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  const categories = [...new Set(progress.map(e => e.category))];
  const daysAtCompany = trainee.startDate ? daysBetween(new Date(trainee.startDate), new Date()) : null;

  const TRACK_LABELS = { appdev:'Applications Development', security:'Security & Forensics' };
  const trackLabel = TRACK_LABELS[trainee.track] || trainee.role || '';
  const trackColor = trainee.track === 'security' ? '#b91c1c' : '#1d4ed8';
  const trackBg    = trainee.track === 'security' ? '#fee2e2' : '#dbeafe';

  const avatarContent = trainee.photo
    ? `<img src="${escapeHtml(trainee.photo)}" alt="${escapeHtml(trainee.name)}">`
    : initials(trainee.name);

  // Summary cards: achievements + certificates first
  const summaryCategories = ['achievement', 'certificate', 'skill'];
  const summaryEntries = progress.filter(e => summaryCategories.includes(e.category));

  // Group timeline by category
  const grouped = {};
  for (const e of progress) {
    if (!grouped[e.category]) grouped[e.category] = [];
    grouped[e.category].push(e);
  }

  const categoryLabels = { project: 'Projects', skill: 'Skills', achievement: 'Achievements', certificate: 'Certificates' };
  const categoryOrder = ['achievement', 'certificate', 'project', 'skill'];

  let summaryHtml = '';
  if (summaryEntries.length) {
    summaryHtml = `
      <div class="summary-section">
        <h2>Highlights</h2>
        <div class="summary-cards">
          ${summaryEntries.map(e => `
            <div class="summary-card">
              <span class="card-cat cat-${e.category}">${e.category}</span>
              <h3>${escapeHtml(e.title)}</h3>
              ${e.rating > 0 ? renderStars(e.rating) : ''}
              <div class="card-date">${e.date || ''}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  let timelineHtml = '';
  for (const cat of categoryOrder) {
    if (!grouped[cat]) continue;
    timelineHtml += `
      <div class="timeline-group">
        <h3>${categoryLabels[cat] || cat}</h3>
        ${grouped[cat].map(e => `
          <div class="timeline-item">
            <div class="timeline-card">
              <div class="tc-header">
                <h4>${escapeHtml(e.title)}</h4>
                <div style="display:flex;align-items:center;gap:.5rem">
                  <span class="tc-cat cat-${e.category}">${e.category}</span>
                  <span class="tc-date">${e.date || ''}</span>
                </div>
              </div>
              ${e.rating > 0 ? renderStars(e.rating) : ''}
              ${e.description ? `<p>${escapeHtml(e.description)}</p>` : ''}
              ${e.image ? `<img class="tc-image" src="${escapeHtml(e.image)}" alt="">` : ''}
              ${e.link ? `<a class="tc-link" href="${escapeHtml(e.link)}" target="_blank">🔗 View Link</a>` : ''}
            </div>
          </div>`).join('')}
      </div>`;
  }

  // Tasks section
  const tasks = trainee.tasks || [];
  const STATUS_STYLE = {
    not_started:{ label:'Not Started', bg:'#f1f5f9', color:'#475569' },
    in_progress:{ label:'In Progress', bg:'#fef9c3', color:'#92400e' },
    needs_review:{ label:'Needs Review', bg:'#fee2e2', color:'#b91c1c' },
    done:{ label:'Complete', bg:'#dcfce7', color:'#15803d' }
  };
  let tasksHtml = '';
  if (tasks.length) {
    const tasksDone = tasks.filter(t=>t.status==='done').length;
    tasksHtml = `
      <div class="summary-section">
        <h2>Tasks — Week Progress</h2>
        <div style="margin-bottom:1rem">
          <div style="display:flex;justify-content:space-between;font-size:.82rem;color:#64748b;margin-bottom:.35rem">
            <span>${tasksDone} of ${tasks.length} complete</span>
            <span>${Math.round(tasksDone/tasks.length*100)}%</span>
          </div>
          <div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${Math.round(tasksDone/tasks.length*100)}%;background:#2563eb;border-radius:4px;transition:width .5s"></div>
          </div>
        </div>
        ${tasks.map(tk=>{
          const st = STATUS_STYLE[tk.status||'not_started'];
          return `<div style="border:1px solid #e2e8f0;border-radius:.65rem;padding:.9rem 1.1rem;margin-bottom:.6rem">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;flex-wrap:wrap">
              <div>
                <div style="font-size:.95rem;font-weight:600">Week ${tk.week} — ${escapeHtml(tk.title)}</div>
                <div style="font-size:.78rem;color:#64748b;margin-top:.2rem">${escapeHtml(tk.desc||'')}</div>
              </div>
              <span style="background:${st.bg};color:${st.color};padding:.2rem .75rem;border-radius:1rem;font-size:.72rem;font-weight:600;white-space:nowrap">${st.label}</span>
            </div>
            ${tk.grade!==null&&tk.grade!==''?`<div style="margin-top:.5rem;font-size:.82rem"><strong>Grade:</strong> ${tk.grade}/100</div>`:''}
            ${tk.feedback?`<div style="margin-top:.4rem;font-size:.82rem;color:#475569;background:#f8fafc;padding:.5rem .75rem;border-radius:.4rem">${escapeHtml(tk.feedback)}</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
  }

  // Attendance section
  const att = (trainee.attendance || []).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const present = att.filter(a=>a.status==='present').length;
  const late    = att.filter(a=>a.status==='late').length;
  const absent  = att.filter(a=>a.status==='absent').length;
  let attHtml = '';
  if (att.length) {
    const pct = Math.round((present+late)/att.length*100);
    attHtml = `
      <div class="summary-section">
        <h2>Attendance</h2>
        <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem">
          <span style="background:#dcfce7;color:#15803d;padding:.3rem .85rem;border-radius:.5rem;font-size:.82rem;font-weight:600">✓ Present: ${present}</span>
          <span style="background:#fef9c3;color:#92400e;padding:.3rem .85rem;border-radius:.5rem;font-size:.82rem;font-weight:600">⏱ Late: ${late}</span>
          <span style="background:#fee2e2;color:#b91c1c;padding:.3rem .85rem;border-radius:.5rem;font-size:.82rem;font-weight:600">✗ Absent: ${absent}</span>
          <span style="background:#eff6ff;color:#1d4ed8;padding:.3rem .85rem;border-radius:.5rem;font-size:.82rem;font-weight:600">Attendance Rate: ${pct}%</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.4rem">
          ${att.slice(0,30).map(a=>{
            const bg = a.status==='present'?'#dcfce7':a.status==='late'?'#fef9c3':'#fee2e2';
            const cl = a.status==='present'?'#15803d':a.status==='late'?'#92400e':'#b91c1c';
            return `<div style="background:${bg};border-radius:.5rem;padding:.4rem .6rem;text-align:center">
              <div style="font-size:.72rem;font-weight:600;color:${cl}">${a.status.toUpperCase()}</div>
              <div style="font-size:.75rem;color:#475569">${a.date}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-avatar">${avatarContent}</div>
      <h1>${escapeHtml(trainee.name)}</h1>
      <div style="margin:.4rem 0"><span style="background:${trackBg};color:${trackColor};padding:.25rem .9rem;border-radius:1rem;font-size:.82rem;font-weight:600">${escapeHtml(trackLabel)}</span></div>
      <div class="meta">
        ${trainee.startDate ? `Started ${trainee.startDate}` : ''}
        ${daysAtCompany !== null ? ` · ${daysAtCompany} days` : ''}
      </div>
      ${trainee.bio ? `<div class="bio">${escapeHtml(trainee.bio)}</div>` : ''}
    </div>

    <div class="stats">
      <div class="stat"><div class="num">${progress.length}</div><div class="label">Entries</div></div>
      ${daysAtCompany !== null ? `<div class="stat"><div class="num">${daysAtCompany}</div><div class="label">Days</div></div>` : ''}
      <div class="stat"><div class="num">${tasks.filter(t=>t.status==='done').length}/${tasks.length}</div><div class="label">Tasks</div></div>
      ${att.length ? `<div class="stat"><div class="num">${Math.round((present+late)/att.length*100)}%</div><div class="label">Attendance</div></div>` : ''}
    </div>

    <div class="content">
      ${tasksHtml}
      ${attHtml}
      ${summaryHtml}
      <div class="timeline-section">
        <h2>Progress Timeline</h2>
        <div class="timeline">
          ${timelineHtml || '<p style="color:#94a3b8;padding:1rem 0">No progress entries yet.</p>'}
        </div>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.timeline-item').forEach(el => observer.observe(el));
  });
}

render();
</script>
</body>
</html>
