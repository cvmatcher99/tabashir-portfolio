<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabashir Training — KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.header-left{display:flex;align-items:center;gap:.75rem}
.header-logo{width:32px;height:32px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:800;letter-spacing:.5px}
.header h1{font-size:1rem;font-weight:700;color:#1e293b}
.header h1 span{color:#2563eb}
.header-right{display:flex;align-items:center;gap:1rem}
.header-right a{font-size:.8rem;font-weight:500;color:#2563eb;text-decoration:none;padding:.3rem .75rem;border:1px solid #dbeafe;border-radius:6px;transition:all .15s}
.header-right a:hover{background:#eff6ff}
.pulse{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:#94a3b8}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Layout ── */
.container{max-width:1240px;margin:0 auto;padding:1.5rem}

/* ── Stat cards ── */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.25rem}
.stat-card{background:#fff;border-radius:12px;padding:1.25rem 1.4rem;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e2e8f0;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.stat-card.c-blue::before{background:#2563eb}
.stat-card.c-green::before{background:#16a34a}
.stat-card.c-amber::before{background:#d97706}
.stat-card.c-purple::before{background:#7c3aed}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:.85rem}
.ic-blue{background:#eff6ff}.ic-green{background:#f0fdf4}.ic-amber{background:#fffbeb}.ic-purple{background:#f5f3ff}
.stat-label{font-size:.7rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.stat-value{font-size:2.1rem;font-weight:800;color:#0f172a;line-height:1;margin-bottom:.3rem}
.stat-sub{font-size:.75rem;color:#64748b}
.stat-bar{height:3px;background:#f1f5f9;border-radius:2px;margin-top:.85rem;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.fill-blue{background:#2563eb}.fill-green{background:#16a34a}.fill-amber{background:#d97706}.fill-purple{background:#7c3aed}

/* ── Section ── */
.section{background:#fff;border-radius:12px;padding:1.35rem;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e2e8f0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.section-title{font-size:.9rem;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:.5rem}
.section-title .dot{width:8px;height:8px;border-radius:50%}

/* ── Charts ── */
.charts-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.chart-box{border:1px solid #f1f5f9;border-radius:10px;padding:1.2rem;text-align:center;background:#fafbfc}
.chart-box-title{font-size:.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.donut-wrap{position:relative;width:120px;height:120px;margin:0 auto 1rem}
.donut-wrap svg{transform:rotate(-90deg)}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.35rem;font-weight:800;color:#0f172a;text-align:center;line-height:1}
.donut-center small{display:block;font-size:.6rem;font-weight:500;color:#94a3b8;margin-top:.15rem}
.legend{display:flex;flex-direction:column;gap:.35rem;text-align:left}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:#64748b;gap:.5rem}
.legend-left{display:flex;align-items:center;gap:.4rem}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-val{font-weight:700;color:#1e293b}

/* ── Track cards ── */
.track-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.track-card{border-radius:10px;padding:1.2rem;border:1px solid #e2e8f0}
.track-card.t-security{background:linear-gradient(135deg,#fff5f5 0%,#fff 100%);border-color:#fecaca}
.track-card.t-appdev{background:linear-gradient(135deg,#eff6ff 0%,#fff 100%);border-color:#bfdbfe}
.track-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.track-name{font-size:.85rem;font-weight:700}
.track-name.t-red{color:#b91c1c}.track-name.t-blue{color:#1d4ed8}
.track-count{font-size:.72rem;font-weight:600;padding:.2rem .6rem;border-radius:6px}
.tc-red{background:#fee2e2;color:#b91c1c}.tc-blue{background:#dbeafe;color:#1d4ed8}
.track-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.track-row-label{font-size:.78rem;color:#64748b}
.track-row-val{font-size:.82rem;font-weight:700;color:#1e293b}
.prog-bar{height:6px;background:#e2e8f0;border-radius:3px;margin-top:.6rem;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.pfill-red{background:#dc2626}.pfill-blue{background:#2563eb}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:.68rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;padding:.65rem .85rem;text-align:left;border-bottom:2px solid #f1f5f9;white-space:nowrap}
td{padding:.7rem .85rem;font-size:.82rem;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:#f8fafc}
.trainee-name{font-weight:600;color:#1e293b}
.trainee-id{font-size:.68rem;color:#94a3b8;margin-top:.1rem}
.badge{display:inline-block;padding:.2rem .65rem;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.02em}
.badge-security{background:#fee2e2;color:#b91c1c}
.badge-appdev{background:#dbeafe;color:#1d4ed8}
.badge-done{background:#dcfce7;color:#15803d}
.badge-ns{background:#f1f5f9;color:#64748b}
.badge-ip{background:#fef9c3;color:#a16207}
.grade-pill{display:inline-flex;align-items:center;justify-content:center;padding:.2rem .6rem;border-radius:6px;font-size:.78rem;font-weight:700;min-width:42px}
.grade-a{background:#dcfce7;color:#15803d}
.grade-b{background:#dbeafe;color:#1d4ed8}
.grade-c{background:#fef9c3;color:#a16207}
.grade-f{background:#fee2e2;color:#b91c1c}
.grade-na{background:#f1f5f9;color:#94a3b8;font-weight:500}
.task-progress{display:flex;align-items:center;gap:.5rem}
.mini-prog{width:48px;height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.mini-prog-fill{height:100%;background:#2563eb;border-radius:2px}

/* ── Attendance grid ── */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.75rem}
.att-card{border:1px solid #e2e8f0;border-radius:10px;padding:.9rem;background:#fafbfc}
.att-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem}
.att-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0}
.av-red{background:#dc2626}.av-blue{background:#2563eb}
.att-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-dots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:.4rem}
.att-dot{width:12px;height:12px;border-radius:3px}
.att-dot.present{background:#16a34a}
.att-dot.absent{background:#ef4444}
.att-dot.late{background:#f59e0b}
.att-dot.none{background:#e2e8f0}
.att-pct{font-size:.72rem;font-weight:600}
.att-pct.good{color:#15803d}.att-pct.mid{color:#a16207}.att-pct.bad{color:#b91c1c}.att-pct.none{color:#94a3b8}

/* ── Empty ── */
.empty{text-align:center;padding:3rem;color:#94a3b8;font-size:.875rem}

/* ── Responsive ── */
@media(max-width:900px){
  .summary-grid{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr 1fr}
  .charts-row .chart-box:last-child{grid-column:1/-1}
}

/* ── Mobile ── */
@media(max-width:600px){
  body{background:#f1f5f9}
  .header{padding:0 1rem;height:52px}
  .header h1{font-size:.9rem}
  .header-logo{width:28px;height:28px;font-size:.65rem}
  .pulse{display:none}
  .header-right a{font-size:.75rem;padding:.25rem .6rem}

  .container{padding:.75rem}

  /* Cards 2 col compact */
  .summary-grid{grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.85rem}
  .stat-card{padding:.9rem 1rem;border-radius:10px}
  .stat-card::before{height:3px}
  .stat-icon{width:30px;height:30px;font-size:.85rem;margin-bottom:.6rem;border-radius:8px}
  .stat-label{font-size:.62rem;margin-bottom:.2rem}
  .stat-value{font-size:1.6rem}
  .stat-sub{font-size:.68rem}

  /* Section */
  .section{padding:1rem;border-radius:10px;margin-bottom:.85rem}
  .section-header{margin-bottom:.85rem}
  .section-title{font-size:.82rem}

  /* Charts: horizontal scroll row */
  .charts-row{
    display:flex;overflow-x:auto;gap:.75rem;
    padding-bottom:.5rem;scroll-snap-type:x mandatory;
  }
  .charts-row::-webkit-scrollbar{height:3px}
  .charts-row::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
  .chart-box{
    flex:0 0 200px;scroll-snap-align:start;
    border-radius:10px;padding:1rem;
  }
  .donut-wrap{width:90px;height:90px}
  .donut-wrap svg{width:90px;height:90px}
  .donut-center{font-size:1.1rem}
  .chart-box-title{font-size:.68rem;margin-bottom:.75rem}
  .legend-item{font-size:.68rem}

  /* Track cards stacked */
  .track-grid{grid-template-columns:1fr;gap:.6rem}
  .track-card{padding:1rem}
  .track-name{font-size:.82rem}

  /* Table → mobile cards */
  .table-wrap table{display:none}
  .mobile-cards{display:flex;flex-direction:column;gap:.6rem}
  .m-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.9rem 1rem}
  .m-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
  .m-card-name{font-size:.85rem;font-weight:700;color:#1e293b}
  .m-card-id{font-size:.65rem;color:#94a3b8;margin-top:.1rem}
  .m-card-rows{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
  .m-card-row{display:flex;flex-direction:column;gap:.15rem}
  .m-card-label{font-size:.62rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .m-card-val{font-size:.82rem;font-weight:600;color:#1e293b}

  /* Attendance */
  .att-grid{grid-template-columns:1fr 1fr;gap:.6rem}
  .att-card{padding:.75rem;border-radius:8px}
  .att-dot{width:10px;height:10px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">KPI</div>
    <h1><span>Training</span> Dashboard</h1>
  </div>
  <div class="header-right">
    <div class="pulse"><div class="pulse-dot"></div><span id="lastUpdated">Loading…</span></div>
    <a href="portfolio.html" target="_blank">Portfolios ↗</a>
  </div>
</div>

<div class="container">

  <!-- ── Summary Cards ── -->
  <div class="summary-grid">
    <div class="stat-card c-blue">
      <div class="stat-icon ic-blue"></div>
      <div class="stat-label">Total Trainees</div>
      <div class="stat-value" id="kTotalTrainees">—</div>
      <div class="stat-sub" id="kTrackSplit">—</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-icon ic-green"></div>
      <div class="stat-label">Task Completion</div>
      <div class="stat-value" id="kCompletion">—</div>
      <div class="stat-sub" id="kCompletionSub">—</div>
      <div class="stat-bar"><div class="stat-bar-fill fill-green" id="kCompBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card c-amber">
      <div class="stat-icon ic-amber"></div>
      <div class="stat-label">Average Grade</div>
      <div class="stat-value" id="kAvgGrade">—</div>
      <div class="stat-sub" id="kGradedSub">—</div>
      <div class="stat-bar"><div class="stat-bar-fill fill-amber" id="kGradeBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card c-purple">
      <div class="stat-icon ic-purple"></div>
      <div class="stat-label">Attendance Rate</div>
      <div class="stat-value" id="kAttRate">—</div>
      <div class="stat-sub" id="kAttSub">—</div>
      <div class="stat-bar"><div class="stat-bar-fill fill-purple" id="kAttBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- ── Charts ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><div class="dot" style="background:#2563eb"></div>Overview</div>
    </div>
    <div class="charts-row">

      <div class="chart-box">
        <div class="chart-box-title">Task Status</div>
        <div class="donut-wrap">
          <svg width="120" height="120" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="38" fill="none" stroke="#f1f5f9" stroke-width="13"/>
            <circle id="donut1a" cx="50" cy="50" r="38" fill="none" stroke="#16a34a" stroke-width="13" stroke-dasharray="0 239"/>
            <circle id="donut1b" cx="50" cy="50" r="38" fill="none" stroke="#f59e0b" stroke-width="13" stroke-dasharray="0 239"/>
            <circle id="donut1c" cx="50" cy="50" r="38" fill="none" stroke="#e2e8f0" stroke-width="13" stroke-dasharray="0 239"/>
          </svg>
          <div class="donut-center"><span id="donut1center">—</span><small>done</small></div>
        </div>
        <div class="legend" id="legend1"></div>
      </div>

      <div class="chart-box">
        <div class="chart-box-title">Grade Distribution</div>
        <div class="donut-wrap">
          <svg width="120" height="120" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="38" fill="none" stroke="#f1f5f9" stroke-width="13"/>
            <circle id="donut2a" cx="50" cy="50" r="38" fill="none" stroke="#15803d" stroke-width="13" stroke-dasharray="0 239"/>
            <circle id="donut2b" cx="50" cy="50" r="38" fill="none" stroke="#1d4ed8" stroke-width="13" stroke-dasharray="0 239"/>
            <circle id="donut2c" cx="50" cy="50" r="38" fill="none" stroke="#d97706" stroke-width="13" stroke-dasharray="0 239"/>
          </svg>
          <div class="donut-center"><span id="donut2center">—</span><small>avg</small></div>
        </div>
        <div class="legend" id="legend2"></div>
      </div>

      <div class="chart-box">
        <div class="chart-box-title">By Track</div>
        <div class="donut-wrap">
          <svg width="120" height="120" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="38" fill="none" stroke="#f1f5f9" stroke-width="13"/>
            <circle id="donut3a" cx="50" cy="50" r="38" fill="none" stroke="#dc2626" stroke-width="13" stroke-dasharray="0 239"/>
            <circle id="donut3b" cx="50" cy="50" r="38" fill="none" stroke="#2563eb" stroke-width="13" stroke-dasharray="0 239"/>
          </svg>
          <div class="donut-center"><span id="donut3center">—</span><small>total</small></div>
        </div>
        <div class="legend" id="legend3"></div>
      </div>

    </div>
  </div>

  <!-- ── Track Cards ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><div class="dot" style="background:#7c3aed"></div>By Track</div>
    </div>
    <div class="track-grid" id="trackGrid"></div>
  </div>

  <!-- ── Trainee Table ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><div class="dot" style="background:#16a34a"></div>Trainee Progress</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Trainee</th>
            <th>Track</th>
            <th>Tasks</th>
            <th>Grade</th>
            <th>Attendance</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="traineeTableBody"></tbody>
      </table>
      <div class="mobile-cards" id="mobileCards"></div>
    </div>
  </div>

  <!-- ── Attendance Detail ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><div class="dot" style="background:#d97706"></div>Attendance Detail</div>
    </div>
    <div class="att-grid" id="attGrid"></div>
  </div>

</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/cvmatcher99/tabashir-portfolio/main/data.json';
const CIRC = 2 * Math.PI * 38;

async function loadData() {
  try { const r = await fetch(DATA_URL + '?t=' + Date.now()); return await r.json(); }
  catch(e) { return null; }
}

function gradeClass(g) {
  if (g == null) return 'grade-na';
  if (g >= 90) return 'grade-a';
  if (g >= 75) return 'grade-b';
  if (g >= 60) return 'grade-c';
  return 'grade-f';
}

function gradeLabel(g) { return g == null ? 'N/A' : g + '%'; }

function initials(name) {
  const parts = name.split(' ');
  return (parts[0]?.[0] || '') + (parts[1]?.[0] || '');
}

function setDonuts(ids, values, total, centerEl, centerTxt) {
  let offset = 0;
  ids.forEach(([id], i) => {
    const el = document.getElementById(id);
    if (!el) return;
    const pct = total > 0 ? values[i] / total : 0;
    const dash = pct * CIRC;
    el.setAttribute('stroke-dasharray', `${dash} ${CIRC - dash}`);
    el.setAttribute('stroke-dashoffset', -offset);
    offset += dash;
  });
  if (centerEl) document.getElementById(centerEl).textContent = centerTxt;
}

function makeLegend(id, items) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = items.map(it =>
    `<div class="legend-item"><div class="legend-left"><div class="legend-dot" style="background:${it.color}"></div>${it.label}</div><span class="legend-val">${it.val}</span></div>`
  ).join('');
}

async function render() {
  const data = await loadData();
  if (!data) { document.querySelector('.container').innerHTML = '<div class="empty">Could not load data.</div>'; return; }

  const trainees = Object.entries(data).map(([id, t]) => ({ id, ...t }));
  const total = trainees.length;

  let doneCount=0, ipCount=0, nsCount=0, gradedGrades=[];
  trainees.forEach(t => {
    (t.tasks||[]).forEach(task => {
      if (task.status==='done') doneCount++;
      else if (task.status==='in_progress') ipCount++;
      else nsCount++;
      if (task.grade != null) gradedGrades.push(task.grade);
    });
  });
  const totalTasks = doneCount + ipCount + nsCount;
  const compPct = totalTasks > 0 ? Math.round(doneCount/totalTasks*100) : 0;
  const avgGrade = gradedGrades.length > 0 ? Math.round(gradedGrades.reduce((a,b)=>a+b,0)/gradedGrades.length) : null;

  let attPresent=0, attAbsent=0, attLate=0;
  trainees.forEach(t => {
    (t.attendance||[]).forEach(a => {
      if (a.status==='present') attPresent++;
      else if (a.status==='absent') attAbsent++;
      else if (a.status==='late') attLate++;
    });
  });
  const attTotal = attPresent + attAbsent + attLate;
  const attPct = attTotal > 0 ? Math.round(attPresent/attTotal*100) : 0;
  const secCount = trainees.filter(t=>t.track==='security').length;
  const appCount = trainees.filter(t=>t.track==='appdev').length;

  // Summary cards
  document.getElementById('kTotalTrainees').textContent = total;
  document.getElementById('kTrackSplit').textContent = `${secCount} Security · ${appCount} App Dev`;
  document.getElementById('kCompletion').textContent = compPct + '%';
  document.getElementById('kCompletionSub').textContent = `${doneCount} of ${totalTasks} tasks done`;
  document.getElementById('kCompBar').style.width = compPct + '%';
  document.getElementById('kAvgGrade').textContent = avgGrade != null ? avgGrade + '%' : '—';
  document.getElementById('kGradedSub').textContent = gradedGrades.length > 0 ? `${gradedGrades.length} graded` : 'No grades yet';
  document.getElementById('kGradeBar').style.width = (avgGrade||0) + '%';
  document.getElementById('kAttRate').textContent = attPct > 0 ? attPct + '%' : '—';
  document.getElementById('kAttSub').textContent = attTotal > 0 ? `${attPresent} present · ${attTotal} sessions` : 'No sessions yet';
  document.getElementById('kAttBar').style.width = attPct + '%';
  document.getElementById('lastUpdated').textContent = 'Live · ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  // Donuts
  setDonuts([['donut1a'],['donut1b'],['donut1c']], [doneCount,ipCount,nsCount], totalTasks, 'donut1center', compPct+'%');
  makeLegend('legend1',[{color:'#16a34a',label:'Done',val:doneCount},{color:'#f59e0b',label:'In Progress',val:ipCount},{color:'#e2e8f0',label:'Not Started',val:nsCount}]);

  const gradeA=gradedGrades.filter(g=>g>=90).length, gradeB=gradedGrades.filter(g=>g>=75&&g<90).length, gradeC=gradedGrades.filter(g=>g<75).length;
  setDonuts([['donut2a'],['donut2b'],['donut2c']], [gradeA,gradeB,gradeC], gradedGrades.length, 'donut2center', avgGrade!=null?avgGrade+'%':'—');
  makeLegend('legend2',[{color:'#15803d',label:'A (90+)',val:gradeA},{color:'#1d4ed8',label:'B (75–89)',val:gradeB},{color:'#d97706',label:'Below 75',val:gradeC}]);

  setDonuts([['donut3a'],['donut3b']], [secCount,appCount], total, 'donut3center', total);
  makeLegend('legend3',[{color:'#dc2626',label:'Security',val:secCount},{color:'#2563eb',label:'App Dev',val:appCount}]);

  // Track cards
  const tracks = [
    {key:'security', label:'Security & Forensics', nameClass:'t-red', countClass:'tc-red', cardClass:'t-security', fillClass:'pfill-red', avClass:'av-red'},
    {key:'appdev',   label:'App Development',      nameClass:'t-blue', countClass:'tc-blue', cardClass:'t-appdev', fillClass:'pfill-blue', avClass:'av-blue'}
  ];
  document.getElementById('trackGrid').innerHTML = tracks.map(tr => {
    const members = trainees.filter(t=>t.track===tr.key);
    const tDone = members.reduce((s,t)=>s+(t.tasks||[]).filter(x=>x.status==='done').length,0);
    const tTotal = members.reduce((s,t)=>s+(t.tasks||[]).length,0);
    const tGrades = members.flatMap(t=>(t.tasks||[]).map(x=>x.grade).filter(g=>g!=null));
    const tAvg = tGrades.length>0 ? Math.round(tGrades.reduce((a,b)=>a+b,0)/tGrades.length) : null;
    const tPres = members.reduce((s,t)=>s+(t.attendance||[]).filter(a=>a.status==='present').length,0);
    const tAttTotal = members.reduce((s,t)=>s+(t.attendance||[]).length,0);
    const tAttPct = tAttTotal>0 ? Math.round(tPres/tAttTotal*100) : null;
    const tComp = tTotal>0 ? Math.round(tDone/tTotal*100) : 0;
    return `<div class="track-card ${tr.cardClass}">
      <div class="track-header">
        <div class="track-name ${tr.nameClass}">${tr.label}</div>
        <span class="track-count ${tr.countClass}">${members.length} trainees</span>
      </div>
      <div class="track-row"><span class="track-row-label">Task Completion</span><span class="track-row-val">${tComp}%</span></div>
      <div class="track-row"><span class="track-row-label">Average Grade</span><span class="track-row-val">${tAvg!=null?tAvg+'%':'—'}</span></div>
      <div class="track-row"><span class="track-row-label">Attendance</span><span class="track-row-val">${tAttPct!=null?tAttPct+'%':'—'}</span></div>
      <div class="prog-bar"><div class="prog-fill ${tr.fillClass}" style="width:${tComp}%"></div></div>
    </div>`;
  }).join('');

  // Trainee table
  document.getElementById('traineeTableBody').innerHTML = trainees.map(t => {
    const tasks = t.tasks||[];
    const done = tasks.filter(x=>x.status==='done').length;
    const grades = tasks.map(x=>x.grade).filter(g=>g!=null);
    const avg = grades.length>0 ? Math.round(grades.reduce((a,b)=>a+b,0)/grades.length) : null;
    const att = t.attendance||[];
    const pres = att.filter(a=>a.status==='present').length;
    const attPctT = att.length>0 ? Math.round(pres/att.length*100) : null;
    const taskPct = tasks.length>0 ? Math.round(done/tasks.length*100) : 0;
    const status = done===tasks.length && tasks.length>0 ? '<span class="badge badge-done">On Track</span>'
      : done>0 ? '<span class="badge badge-ip">In Progress</span>'
      : '<span class="badge badge-ns">Not Started</span>';
    const shortName = t.name.split(' ').slice(0,2).join(' ');
    return `<tr>
      <td><div class="trainee-name">${shortName}</div><div class="trainee-id">${t.id}</div></td>
      <td><span class="badge badge-${t.track}">${t.track==='security'?'Security':'App Dev'}</span></td>
      <td><div class="task-progress"><div class="mini-prog"><div class="mini-prog-fill" style="width:${taskPct}%"></div></div><span>${done}/${tasks.length}</span></div></td>
      <td><span class="grade-pill ${gradeClass(avg)}">${gradeLabel(avg)}</span></td>
      <td>${attPctT!=null ? attPctT+'%' : '<span style="color:#94a3b8">—</span>'}</td>
      <td>${status}</td>
    </tr>`;
  }).join('');

  // Mobile cards (replaces table on small screens)
  document.getElementById('mobileCards').innerHTML = trainees.map(t => {
    const tasks = t.tasks||[];
    const done = tasks.filter(x=>x.status==='done').length;
    const grades = tasks.map(x=>x.grade).filter(g=>g!=null);
    const avg = grades.length>0 ? Math.round(grades.reduce((a,b)=>a+b,0)/grades.length) : null;
    const att = t.attendance||[];
    const pres = att.filter(a=>a.status==='present').length;
    const attPctT = att.length>0 ? Math.round(pres/att.length*100) : null;
    const shortName = t.name.split(' ').slice(0,2).join(' ');
    const status = done===tasks.length && tasks.length>0 ? '<span class="badge badge-done">On Track</span>'
      : done>0 ? '<span class="badge badge-ip">In Progress</span>'
      : '<span class="badge badge-ns">Not Started</span>';
    return `<div class="m-card">
      <div class="m-card-top">
        <div><div class="m-card-name">${shortName}</div><div class="m-card-id">${t.id}</div></div>
        ${status}
      </div>
      <div class="m-card-rows">
        <div class="m-card-row"><div class="m-card-label">Track</div><div class="m-card-val"><span class="badge badge-${t.track}">${t.track==='security'?'Security':'App Dev'}</span></div></div>
        <div class="m-card-row"><div class="m-card-label">Tasks</div><div class="m-card-val">${done} / ${tasks.length}</div></div>
        <div class="m-card-row"><div class="m-card-label">Grade</div><div class="m-card-val"><span class="grade-pill ${gradeClass(avg)}">${gradeLabel(avg)}</span></div></div>
        <div class="m-card-row"><div class="m-card-label">Attendance</div><div class="m-card-val">${attPctT!=null?attPctT+'%':'—'}</div></div>
      </div>
    </div>`;
  }).join('');

  // Attendance detail
  document.getElementById('attGrid').innerHTML = trainees.map(t => {
    const att = t.attendance||[];
    const pres = att.filter(a=>a.status==='present').length;
    const pct = att.length>0 ? Math.round(pres/att.length*100) : null;
    const shortName = t.name.split(' ').slice(0,2).join(' ');
    const avClass = t.track==='security' ? 'av-red' : 'av-blue';
    const dots = att.length>0
      ? att.map(a=>`<div class="att-dot ${a.status}" title="${a.date}: ${a.status}"></div>`).join('')
      : '<div class="att-dot none"></div>';
    const pctClass = pct==null ? 'none' : pct>=80 ? 'good' : pct>=60 ? 'mid' : 'bad';
    return `<div class="att-card">
      <div class="att-card-header">
        <div class="att-avatar ${avClass}">${initials(t.name)}</div>
        <div class="att-name" title="${t.name}">${shortName}</div>
      </div>
      <div class="att-dots">${dots}</div>
      <div class="att-pct ${pctClass}">${pct!=null ? pct+'% attendance' : 'No records yet'}</div>
    </div>`;
  }).join('');
}

render();
setInterval(render, 60000);
</script>
</body>
</html>
